name: NBG prospectus monitor

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 min (GitHub may delay a few min)
  workflow_dispatch:          # manual trigger button

permissions:
  contents: write             # needed to commit seen.json back

concurrency:
  group: nbg-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install chromium --with-deps

      - name: Run monitor
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python monitor.py

      - name: Commit updated state
        run: |
          git config user.name "nbg-monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add seen.json
          git diff --cached --quiet || git commit -m "Update seen ISINs"
          git push
